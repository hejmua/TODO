<section class="card">
  <div class="section-title">
    <span class="eyebrow">Nový účet</span>
    <h2>Registrácia</h2>
    <p>Vytvor si prístup a začni spravovať svoje TODO zoznamy.</p>
  </div>

  <form (ngSubmit)="register()">
    <label>
      Meno
      <input [(ngModel)]="username" name="username" autocomplete="username" />
    </label>

    <label>
      Heslo
      <input type="password" [(ngModel)]="password" name="password" autocomplete="new-password" />
    </label>

    <label>
      Over heslo
      <input type="password" [(ngModel)]="password2" name="password2" autocomplete="new-password" />
    </label>

    <button type="submit">Registrovať</button>
  </form>

  <p *ngIf="error" class="error-text">{{ error }}</p>
  <p *ngIf="success" class="success-text">{{ success }}</p>
</section>
