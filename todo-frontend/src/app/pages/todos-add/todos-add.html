<section class="card">
  <div class="section-title">
    <span class="eyebrow">Nová úloha</span>
    <h2>Pridaj položku do TODO</h2>
    <p>Zapíš si, čo treba urobiť, a drž všetko pokope na jednom mieste.</p>
  </div>
  <form>
    <label>
      Názov úlohy
      <input type="text" name="title" placeholder="Napr. Nakúpiť potraviny" />
    </label>
    <label>
      Detail
      <textarea name="detail" rows="3" placeholder="Stručný popis alebo poznámka"></textarea>
    </label>
    <label>
      Termín
      <input type="date" name="dueDate" />
    </label>
    <button type="button">Uložiť (mock)</button>
  </form>
</section>
