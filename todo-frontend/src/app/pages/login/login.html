<!-- Login card and form -->
<section class="card">
  <div class="section-title">
    <span class="eyebrow">Vitaj späť</span>
    <h2>Prihlásenie</h2>
    <p>Prihlás sa a pokračuj v práci na svojich úlohách.</p>
  </div>

  <!-- Credentials form -->
  <form (ngSubmit)="login()">
    <label>
      Meno
      <input [(ngModel)]="username" name="username" autocomplete="username" />
    </label>

    <label>
      Heslo
      <input type="password" [(ngModel)]="password" name="password" autocomplete="current-password" />
    </label>

    <button type="submit">Prihlásiť</button>
  </form>

  <!-- Inline error feedback -->
  <p *ngIf="error" class="error-text">{{ error }}</p>
</section>
